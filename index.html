<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBT Retro-Verification — Tripod Ecosystem</title>
    <link rel="stylesheet" href="./styles.css?v=20260502-01" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand-block">
          <img src="./shema-logo.svg" alt="Shema" class="brand-logo" />
          <p class="eyebrow">Tripod ecosystem</p>
          <h1>OBT Retro-Verification</h1>
        </div>
        <div class="header-actions">
          <a id="openPassageBtn" class="ghost-button" target="_blank" rel="noopener" hidden>
            Open passage in Bible Gateway
          </a>
          <button id="summaryToggle" class="ghost-button" type="button">Coverage report</button>
          <button id="resetSession" class="ghost-button" type="button" title="Clear session and start over">
            Reset session
          </button>
        </div>
      </header>

      <main class="workspace">
        <section id="storyStatus" class="story-status" aria-live="polite"></section>
        <nav id="stepNav" class="step-nav" aria-label="Progress"></nav>

        <section id="audioDock" class="audio-dock" aria-label="Audio controls">
          <div class="audio-main">
            <button id="playToggleButton" class="play-button" type="button" disabled>Play</button>
            <div class="audio-meta">
              <p id="audioTitle" class="audio-title">Choose a recording to begin.</p>
              <div class="audio-actions">
                <button id="backwardButton" class="small-button" type="button" disabled>Back 5s</button>
                <button id="forwardButton" class="small-button" type="button" disabled>Forward 5s</button>
                <button id="playRangeButton" class="small-button" type="button" disabled>
                  Play current selection
                </button>
              </div>
            </div>
          </div>
          <div class="scrubber-row">
            <span id="currentTimeLabel" class="time-label">0:00</span>
            <div id="audioBeadTimeline" class="audio-bead-timeline" aria-label="Recording bead timeline"></div>
            <span id="durationLabel" class="time-label">0:00</span>
          </div>
          <div id="granularityControls" class="granularity-shell" aria-live="polite"></div>
          <p id="rangeLabel" class="range-label"></p>
          <audio id="audioElement" preload="metadata"></audio>
        </section>

        <section id="banner" class="banner hidden" aria-live="polite"></section>
        <section id="screen" class="screen" aria-live="polite"></section>
      </main>
    </div>

    <a id="helpFab" class="help-fab"
       href="https://translationhelper.shemaywam.com/"
       target="_blank" rel="noopener"
       title="Open Translation Helper in a new tab">
      <span class="help-fab-icon" aria-hidden="true">?</span>
      <span class="help-fab-label">Translation Helper</span>
    </a>

    <dialog id="summaryDialog" class="summary-dialog">
      <form method="dialog" class="summary-shell">
        <div class="summary-header">
          <div>
            <p class="eyebrow">Coverage</p>
            <h2>Verification report</h2>
          </div>
          <button class="ghost-button" type="submit">Close</button>
        </div>
        <div id="summaryContent" class="summary-content"></div>
      </form>
    </dialog>

    <script type="module" src="./app.js?v=20260502-01"></script>
  </body>
</html>
