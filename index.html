<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBT Retro-Verification — Tripod Ecosystem</title>
    <link rel="stylesheet" href="./styles.css?v=20260504-bilingual" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand-block">
          <img src="./shema-logo.svg" alt="Shema" class="brand-logo" />
          <p class="eyebrow" data-pt="Ecossistema Tripod">Tripod ecosystem</p>
          <h1 data-pt="Retroverificação OBT">OBT Retro-Verification</h1>
        </div>
        <div class="header-actions">
          <div id="langToggle" class="lang-toggle" role="group" aria-label="Language">
            <button type="button" data-lang="en">EN</button>
            <button type="button" data-lang="pt">PT</button>
          </div>
          <a id="openPassageBtn" class="ghost-button" target="_blank" rel="noopener" hidden
             data-pt="Abrir passagem no Bible Gateway">
            Open passage in Bible Gateway
          </a>
          <button id="summaryToggle" class="ghost-button" type="button"
                  data-pt="Relatório de cobertura">Coverage report</button>
          <button id="resetSession" class="ghost-button" type="button"
                  title="Clear session and start over"
                  data-pt-title="Limpar a sessão e recomeçar"
                  data-pt="Reiniciar sessão">
            Reset session
          </button>
        </div>
      </header>

      <main class="workspace">
        <section id="storyStatus" class="story-status" aria-live="polite"></section>
        <nav id="stepNav" class="step-nav" aria-label="Progress" data-pt-aria="Progresso"></nav>

        <section id="audioDock" class="audio-dock" aria-label="Audio controls" data-pt-aria="Controles de áudio">
          <div class="audio-main">
            <button id="playToggleButton" class="play-button" type="button" disabled data-pt="Tocar">Play</button>
            <div class="audio-meta">
              <p id="audioTitle" class="audio-title" data-pt="Escolha um áudio para começar.">Choose a recording to begin.</p>
              <div class="audio-actions">
                <button id="backwardButton" class="small-button" type="button" disabled data-pt="Voltar 5s">Back 5s</button>
                <button id="forwardButton" class="small-button" type="button" disabled data-pt="Avançar 5s">Forward 5s</button>
              </div>
            </div>
          </div>
          <div class="scrubber-row">
            <span id="currentTimeLabel" class="time-label">0:00</span>
            <div id="audioBeadTimeline" class="audio-bead-timeline"
                 aria-label="Recording bead timeline"
                 data-pt-aria="Linha do tempo das contas"></div>
            <span id="durationLabel" class="time-label">0:00</span>
          </div>
          <div id="granularityControls" class="granularity-shell" aria-live="polite"></div>
          <p id="rangeLabel" class="range-label"></p>
          <audio id="audioElement" preload="metadata"></audio>
        </section>

        <section id="banner" class="banner hidden" aria-live="polite"></section>
        <section id="screen" class="screen" aria-live="polite"></section>
      </main>
    </div>

    <a id="helpFab" class="help-fab"
       href="https://translationhelper.shemaywam.com/"
       target="_blank" rel="noopener"
       title="Open Translation Helper in a new tab"
       data-pt-title="Abrir Auxiliar de Tradução em nova aba">
      <span class="help-fab-icon" aria-hidden="true">?</span>
      <span class="help-fab-label" data-pt="Auxiliar de Tradução">Translation Helper</span>
    </a>

    <dialog id="summaryDialog" class="summary-dialog">
      <form method="dialog" class="summary-shell">
        <div class="summary-header">
          <div>
            <p class="eyebrow" data-pt="Cobertura">Coverage</p>
            <h2 data-pt="Relatório de verificação">Verification report</h2>
          </div>
          <button class="ghost-button" type="submit" data-pt="Fechar">Close</button>
        </div>
        <div id="summaryContent" class="summary-content"></div>
      </form>
    </dialog>

    <script type="module" src="./app.js?v=20260504-bilingual"></script>
  </body>
</html>
